name: PHP Lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Run PHP linter
        run: find . -path './vendor' -prune -o -type f -name '*.php' -print0 | xargs -0 -n 1 php -l
